# SPDX-License-Identifier: AGPL-3.0-or-later
#
# Aegis — security scanning.
#
# Runs four orthogonal scanners that the main `ci` workflow doesn't cover:
#
#   1. govulncheck  — known CVEs in Go module dependencies
#   2. gitleaks    — secrets committed to source
#   3. trivy       — known CVEs in the final container images
#   4. pnpm audit  — known CVEs in frontend dependencies
#
# Triggers:
#   - pull_request / push: catch regressions on the same commit
#   - schedule (weekly):   catch newly disclosed CVEs in pinned deps
#   - workflow_dispatch:   manual run from the Actions tab
#
# All jobs are strict: HIGH/CRITICAL findings fail the workflow. This is
# intentional — false positives should be triaged and either fixed or
# pinned via renovate-bot, not silenced globally.
name: security

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - '**'
  schedule:
    # Mondays 06:00 UTC — cheap nightly-ish cadence for CVE drift.
    - cron: '0 6 * * 1'
  workflow_dispatch:

# Cancel superseded runs on the same ref to save runner minutes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # -----------------------------------------------------------------------
  # 1. Go dependency CVEs
  # -----------------------------------------------------------------------
  govulncheck:
    name: govulncheck (Go)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache-dependency-path: backend/go.sum
          cache: true

      - name: Show toolchain
        run: go version

      - name: Run govulncheck
        # `govulncheck` only analyses symbols actually called from the
        # build, so it produces a much smaller, higher-signal list than
        # a naive `go list -m -u all`. The default exit code is 3 when
        # a known vulnerability is reachable, so a non-zero exit is the
        # gate — no need to parse output.
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          "$(go env GOPATH)/bin/govulncheck" ./...

  # -----------------------------------------------------------------------
  # 2. Secrets in source history
  # -----------------------------------------------------------------------
  gitleaks:
    name: gitleaks (secrets)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history so gitleaks can scan pushed-up secrets that
          # were later removed (a common foot-gun).
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          # Public repos: the OSS build is fine. If this ever moves to
          # a private repo, swap to a GITLEAKS_LICENSE secret.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Upload SARIF to the Security tab so findings show up next
          # to codeql results, not only in the Actions run log.
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: 'true'
          GITLEAKS_ENABLE_SUMMARY: 'true'

  # -----------------------------------------------------------------------
  # 3. Container image CVEs
  # -----------------------------------------------------------------------
  trivy:
    name: trivy (${{ matrix.target.name }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - name: backend
            file: backend/Dockerfile
            tag: aegispanel:dev-${{ github.sha }}
          - name: frontend
            file: frontend/Dockerfile
            tag: aegispanel-ui:dev-${{ github.sha }}
    steps:
      - uses: actions/checkout@v4

      # Build locally so trivy can scan the final image. The ci.yml
      # `containers` job builds and discards, so we can't reuse it
      # cheaply; an extra ~1-2 min per image is acceptable for a
      # security gate that runs weekly and on every PR.
      - name: Build ${{ matrix.target.name }} image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.target.file }}
          tags: ${{ matrix.target.tag }}
          push: false
          # `load: true` puts the image into the runner's local Docker
          # daemon so trivy-action can scan it via `image-ref`. This
          # is incompatible with `cache-to: type=gha` on the docker
          # driver (which doesn't support cache export), so we only
          # read the GHA cache here — first run is cold, subsequent
          # runs hit the cache populated by the ci.yml `containers`
          # job on the same SHA.
          load: true
          cache-from: type=gha
          provenance: false

      - name: Scan image (HIGH+CRITICAL)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ matrix.target.tag }}
          # Table output streams the finding list straight into the
          # Actions log — much more useful for triage than digging
          # through a SARIF file. (The action doesn't accept multiple
          # formats, so SARIF upload to the Security tab is dropped
          # here; Dependabot still covers that surface for deps.)
          format: 'table'
          severity: 'HIGH,CRITICAL'
          # Distroless / Alpine base layers churn with upstream
          # package updates that may not yet have a fix published
          # by the maintainer — `ignore-unfixed` filters those out
          # so the gate only fires on actually fixable issues.
          ignore-unfixed: true
          # `.trivyignore` carries a small, documented set of CVEs
          # we accept (today: Caddy's stale Go stdlib). Every entry
          # there has a re-evaluation plan — silence without context
          # would just be debt.
          ignorefile: '.trivyignore'
          exit-code: '1'

  # -----------------------------------------------------------------------
  # 4. Frontend dependency CVEs
  # -----------------------------------------------------------------------
  pnpm-audit:
    name: pnpm-audit (frontend)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install
        run: pnpm install --frozen-lockfile=false

      - name: Audit
        # `--audit-level=high` gates only on high+ severity so we don't
        # burn a week on a moderate issue. `pnpm audit` exits non-zero
        # on a gate failure, which is the desired behaviour.
        run: pnpm audit --prod --audit-level=high
