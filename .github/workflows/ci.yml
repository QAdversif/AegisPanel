# SPDX-License-Identifier: AGPL-3.0-or-later
name: ci

on:
  # Trigger on every push — including feature branches — so
  # PRs that haven't yet had their first push event get a
  # baseline CI run, and so that the workflow always shows
  # green/red per-branch.
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - '**'
  workflow_dispatch:

# Cancel in-flight runs for the same branch / PR when a new commit lands.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # -----------------------------------------------------------------------
  # Backend (Go)
  # -----------------------------------------------------------------------
  backend:
    name: backend (${{ matrix.os }}/${{ matrix.go }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        go: ['1.26']

    # `services: postgres` is what makes the integration suite possible
    # without testcontainers. The image is pinned to a specific Postgres
    # major — `postgres:16-alpine` — and the credentials / db name are
    # passed to the test step via INTEGRATION_DATABASE_URL. We pre-create
    # a healthcheck wait so the runner doesn't race the service boot
    # (Go tests have a 30s retry loop in testutil, but a healthcheck
    # gives a deterministic ready signal in the Actions log).
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: aegis
          POSTGRES_PASSWORD: aegis
          POSTGRES_DB: aegis_it
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U aegis -d aegis_it"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go ${{ matrix.go }}
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go }}
          cache-dependency-path: backend/go.sum
          cache: true

      - name: Show toolchain
        run: go version

      - name: Verify modules
        run: go mod verify

      - name: Build
        run: go build -trimpath ./...

      - name: Run unit tests
        run: go test -race -count=1 -coverprofile=coverage.out ./...

      - name: Run integration tests
        # `INTEGRATION_DATABASE_URL` is what the `testutil.MustNewPool`
        # helper expects. The DSN points at the service container on
        # `localhost:5432` (the port mapping above exposes 5432 from
        # the service to the runner host). On every test run the
        # helper drops & recreates the database for isolation.
        env:
          INTEGRATION_DATABASE_URL: postgres://aegis:aegis@localhost:5432/aegis_it?sslmode=disable
        run: go test -race -count=1 -tags=integration ./...

      - name: Upload coverage
        if: matrix.go == '1.26'
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage.out
          if-no-files-found: ignore

      - name: golangci-lint
        # Lint the integration build too — the suite imports the
        # production code via testutil and would otherwise escape the
        # linter's view.
        env:
          GOFLAGS: -tags=integration
        working-directory: backend
        run: |
          go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@latest
          $(go env GOPATH)/bin/golangci-lint run --timeout=5m ./...

  # -----------------------------------------------------------------------
  # Frontend (Vue 3 / Vite)
  # -----------------------------------------------------------------------
  frontend:
    name: frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install
        run: pnpm install --frozen-lockfile=false

      - name: Check codegen up to date
        # Fails the build if `pnpm run codegen` would
        # produce a diff against the committed
        # `src/types/api.d.ts`. The PR author must
        # run `pnpm codegen` locally and commit the
        # result whenever `docs/openapi.yaml` changes.
        # The check is `pnpm run codegen:check`, a
        # cross-platform Node script that compares the
        # committed file against a fresh regeneration
        # (no `git diff` so a CI checkout that has
        # uncommitted local changes does not produce
        # false positives).
        run: pnpm run codegen:check

      - name: Type-check
        run: pnpm run type-check

      - name: Lint
        run: pnpm run lint

      - name: Check raw text in templates
        # Fails the build if a .vue template contains
        # user-facing text that should have been wrapped
        # in vue-i18n's t('key'). The script lives at
        # tools/scripts/check-raw-text.mjs and is the
        # "ESLint rule" for i18n that we couldn't
        # reasonably express in eslint-plugin-vue-i18n
        # (the published plugin is pinned to eslint 5/6).
        run: node tools/scripts/check-raw-text.mjs

      # vitest is wired but the Phase 0 frontend has no test files
      # yet, so `pnpm run test` would error with "no test files
      # found". Skip until the first component test lands; we
      # re-enable the step then.
      # - name: Unit tests
      #   run: pnpm run test

      - name: Build
        run: pnpm run build

      - name: Upload bundle
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist

  # -----------------------------------------------------------------------
  # Migrations (sqlfluff on the SQL files)
  # -----------------------------------------------------------------------
  migrations:
    name: migrations
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install sqlfluff
        run: pip install sqlfluff==3.0.3
      - name: Lint
        run: sqlfluff lint backend/migrations --dialect postgres

  # -----------------------------------------------------------------------
  # Ansible (ansible-lint on the deploy/ roles)
  # -----------------------------------------------------------------------
  ansible:
    name: ansible
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install ansible-lint
        run: pip install ansible-lint==25.5.0
      - name: Lint
        working-directory: deploy/ansible
        run: ansible-lint

  # -----------------------------------------------------------------------
  # Docs (markdownlint)
  # -----------------------------------------------------------------------
  docs:
    name: docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DavidAnson/markdownlint-cli2-action@v19
        with:
          globs: |
            **/*.md
            !node_modules/**
            !**/node_modules/**
            !**/dist/**
            !**/.vuepress/.temp/**
            !**/.vuepress/.cache/**

  # -----------------------------------------------------------------------
  # Shell scripts (shellcheck)
  # -----------------------------------------------------------------------
  shell:
    name: shellcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck
      - name: Lint
        run: |
          find tools -type f -name '*.sh' -print0 \
              | xargs -0 -I {} shellcheck --severity=warning {}

  # -----------------------------------------------------------------------
  # Container images
  # -----------------------------------------------------------------------
  containers:
    name: containers
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: backend/Dockerfile
          tags: qadversif/aegispanel:dev-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          push: false
          provenance: false

      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: frontend/Dockerfile
          tags: qadversif/aegispanel-ui:dev-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          push: false
          provenance: false
