# SPDX-License-Identifier: AGPL-3.0-or-later
name: ci

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

# Cancel in-flight runs for the same branch / PR when a new commit lands.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # -----------------------------------------------------------------------
  # Backend (Go)
  # -----------------------------------------------------------------------
  backend:
    name: backend (${{ matrix.os }}/${{ matrix.go }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        go: ['1.26']

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go ${{ matrix.go }}
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go }}
          cache-dependency-path: backend/go.sum
          cache: true

      - name: Show toolchain
        run: go version

      - name: Verify modules
        run: go mod verify

      - name: Build
        run: go build -trimpath ./...

        - name: Run tests
        run: go test -race -count=1 -coverprofile=coverage.out ./...

      - name: Upload coverage
        if: matrix.go == '1.26'
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage.out
          if-no-files-found: ignore

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v1.61.0
          working-directory: backend
          args: --timeout=5m

  # -----------------------------------------------------------------------
  # Frontend (Vue 3 / Vite)
  # -----------------------------------------------------------------------
  frontend:
    name: frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install
        run: pnpm install --frozen-lockfile=false

      - name: Type-check
        run: pnpm run type-check

      - name: Lint
        run: pnpm run lint

      - name: Unit tests
        run: pnpm run test

      - name: Build
        run: pnpm run build

      - name: Upload bundle
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist

  # -----------------------------------------------------------------------
  # Migrations (sqlfluff on the SQL files)
  # -----------------------------------------------------------------------
  migrations:
    name: migrations
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install sqlfluff
        run: pip install sqlfluff==3.0.3
      - name: Lint
        run: sqlfluff lint backend/migrations --dialect postgres

  # -----------------------------------------------------------------------
  # Ansible (ansible-lint on the deploy/ roles)
  # -----------------------------------------------------------------------
  ansible:
    name: ansible
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install ansible-lint
        run: pip install ansible-lint==25.5.0
      - name: Lint
        run: ansible-lint deploy/ansible

  # -----------------------------------------------------------------------
  # Docs (markdownlint)
  # -----------------------------------------------------------------------
  docs:
    name: docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DavidAnson/markdownlint-cli2-action@v19
        with:
          globs: |
            **/*.md
            !node_modules/**
            !**/node_modules/**
            !**/dist/**
            !**/.vuepress/.temp/**
            !**/.vuepress/.cache/**

  # -----------------------------------------------------------------------
  # Shell scripts (shellcheck)
  # -----------------------------------------------------------------------
  shell:
    name: shellcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck
      - name: Lint
        run: |
          find tools -type f -name '*.sh' -print0 \
              | xargs -0 -I {} shellcheck --severity=warning {}

  # -----------------------------------------------------------------------
  # Container images
  # -----------------------------------------------------------------------
  containers:
    name: containers
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: backend/Dockerfile
          tags: QAdversif/AegisPanel:dev-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          push: false
          provenance: false

      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: frontend/Dockerfile
          tags: QAdversif/AegisPanel-ui:dev-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          push: false
          provenance: false
