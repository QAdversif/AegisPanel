;
; Local inventory for the Aegis dev environment.
; Replace the IP / port / user with whatever you used to bootstrap the
; node. The bootstrap user must be able to sudo without a password
; (or pass --ask-become-pass).

[aegis_nodes]
aegis-node-01 ansible_host=127.0.0.1 ansible_port=2222 ansible_user=root

[aegis_nodes:vars]
ansible_become=true
ansible_become_method=sudo
aegis_panel_url=https://panel.aegis.local
