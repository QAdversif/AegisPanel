;
; fail2ban filter: panel-login (matches failed login attempts in the
; Caddy JSON access log). Pattern is intentionally narrow — only the
; POST to /api/v1/auth/login.

[INCLUDES]
before = common.conf

[Definition]
failregex = ^.*"remote_ip":"<HOST>".*"request":"/api/v1/auth/login".*"status":(401|403).*$
ignoreregex =

[Init]
datepattern = ^.*"ts":"%%Y-%%m-%%dT%%H:%%M:%%S
