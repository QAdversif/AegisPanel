#
# golangci-lint configuration for Aegis backend.
# Docs: https://golangci-lint.run/usage/configuration/

run:
  timeout: 5m
  tests: true
  modules-download-mode: readonly

linters:
  disable-all: true
  enable:
    - errcheck       # unchecked errors
    - govet          # standard vet checks
    - ineffassign    # unused assignments
    - staticcheck    # static analysis suite
    - unused         # unused identifiers
    - gosec          # security-focused checks
    - gocritic       # opinionated style + perf hints
    - gofmt          # canonical formatting
    - goimports      # import grouping
    - misspell       # common typos
    - bodyclose      # http body close
    - contextcheck   # ctx propagation
    - nilerr         # returning nil after handling err
    - nolintlint     # nolint directive linting
    - revive         # golint successor
    - errorlint      # error wrapping hints
    - prealloc       # slice prealloc hints
    - unconvert      # unnecessary conversions
    - unparam        # unused function params

linters-settings:
  gocritic:
    enabled-tags:
      - diagnostic
      - style
      - performance
    disabled-checks:
      - dupImport     # too noisy with multi-package
      - ifElseChain
      - hugeParam
      - rangeValCopy
  gosec:
    excludes:
      - G304  # file inclusion via variable — needed for our config templates
  revive:
    rules:
      - name: exported
        disabled: false
      - name: package-comments
      - name: var-naming
      - name: indent-error-flow
      - name: error-strings
      - name: error-naming
      - name: error-return

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck
        - gosec
        - gocritic
    - path: migrations/
      linters:
        - gosec
        - revive
  exclude-use-default: false
  max-issues-per-linter: 0
  max-same-issues: 0

severity:
  default: error
  rules:
    - linters: [gosec]
      severity: high
