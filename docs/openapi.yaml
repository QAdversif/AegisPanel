        city:
          type: string
          maxLength: 64
        tags:
          type: array
          items:
            type: string
        endpoints:
          type: array
          minItems: 1
          maxItems: 32
          items:
            $ref: '#/components/schemas/Endpoint'
        balancer:
          $ref: '#/components/schemas/Balancer'
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    HostCreateRequest:
      type: object
      required: [remark, type, endpoints]
      properties:
        remark:
          type: string
          minLength: 1
          maxLength: 64
        displayName:
          type: string
          maxLength: 128
        type:
          $ref: '#/components/schemas/HostType'
        enabled:
          type: boolean
        priority:
          type: integer
          minimum: 0
          maximum: 1000
        statusFilter:
          type: array
          items:
            type: string
            enum: [active, on_hold, expired, limited, disabled]
        country:
          type: string
          maxLength: 2
        city:
          type: string
          maxLength: 64
        tags:
          type: array
          items:
            type: string
        endpoints:
          type: array
          minItems: 1
          maxItems: 32
          items:
            $ref: '#/components/schemas/Endpoint'
        balancer:
          $ref: '#/components/schemas/Balancer'

    HostUpdateRequest:
      type: object
      properties:
        remark:
          type: string
          minLength: 1
          maxLength: 64
        displayName:
          type: string
          maxLength: 128
        type:
          $ref: '#/components/schemas/HostType'
        enabled:
          type: boolean
        priority:
          type: integer
          minimum: 0
          maximum: 1000
        statusFilter:
          type: array
          items:
            type: string
            enum: [active, on_hold, expired, limited, disabled]
        country:
          type: string
          maxLength: 2
        city:
          type: string
          maxLength: 64
        tags:
          type: array
          items:
            type: string
        endpoints:
          type: array
          minItems: 1
          maxItems: 32
          items:
            $ref: '#/components/schemas/Endpoint'
        balancer:
          $ref: '#/components/schemas/Balancer'

    HostListResponse:
      type: object
      required: [hosts]
      properties:
        hosts:
          type: array
          items:
            $ref: '#/components/schemas/Host'

    UserLifecycleStatus:
      type: string
      enum: [active, grace, disabled, expired, deleted]

    User:
      type: object
      required: [id, username, status, trafficLimitBytes, trafficUsedBytes, deviceLimit, subToken, createdAt, updatedAt]
      properties:
        id:
          type: string
          format: uuid
        username:
          type: string
        status:
          $ref: '#/components/schemas/UserLifecycleStatus'
        planId:
          type: string
          format: uuid
        expireAt:
          type: string
          format: date-time
        trafficLimitBytes:
          type: integer
          format: int64
        trafficUsedBytes:
          type: integer
          format: int64
        deviceLimit:
          type: integer
          minimum: 0
          maximum: 64
        hostsAllowlist:
          type: array
          items:
            type: string
            format: uuid
        hostsBlocklist:
          type: array
          items:
            type: string
            format: uuid
        subToken:
          type: string
          pattern: '^[0-9a-f]{64}$'
        subTokenRotatedAt:
          type: string
          format: date-time
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    UserCreateRequest:
      type: object
      required: [username]
      properties:
        username:
          type: string
          minLength: 3
          maxLength: 32
        status:
          $ref: '#/components/schemas/UserLifecycleStatus'
        planId:
          type: string
          format: uuid
        expireAt:
          type: string
          format: date-time
        trafficLimitBytes:
          type: integer
          format: int64
          minimum: 0
        deviceLimit:
          type: integer
          minimum: 0
          maximum: 64

    UserUpdateRequest:
      type: object
      properties:
        username:
          type: string
          minLength: 3
          maxLength: 32
        status:
          $ref: '#/components/schemas/UserLifecycleStatus'
        planId:
          type: string
          format: uuid
        clearPlanId:
          type: boolean
        expireAt:
          type: string
          format: date-time
        clearExpireAt:
          type: boolean
        trafficLimitBytes:
          type: integer
          format: int64
          minimum: 0
        deviceLimit:
          type: integer
          minimum: 0
          maximum: 64

    UserListResponse:
      type: object
      required: [users]
      properties:
        users:
          type: array
          items:
            $ref: '#/components/schemas/User'

    PanelPathConfig:
      type: object
      required: [id, subPath, rotatedAt, createdAt]
      properties:
        id:
          type: string
          format: uuid
        subPath:
          type: string
          description: |
            The current URL prefix. Empty = the default
            `/api/v1/sub/{token}` path. Non-empty = a rotated
            secret prefix.
        rotatedAt:
          type: string
          format: date-time
        createdAt:
          type: string
          format: date-time

    PanelPathRotateRequest:
      type: object
      properties:
        graceWindowSeconds:
          type: integer
          minimum: 0
          maximum: 3600
          description: |
            Grace window during which the OLD sub_path is
            still served. 0 = no grace. The server caps at
            1 hour.

    PanelPathRotateToRequest:
      type: object
      required: [subPath]
      properties:
        subPath:
          type: string
          minLength: 4
          maxLength: 64
          pattern: '^[a-z0-9-]+$'
          description: |
            The new sub_path. Must match [a-z0-9-]{4,64}.
        graceWindowSeconds:
          type: integer
          minimum: 0
          maximum: 3600
