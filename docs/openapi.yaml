openapi: 3.0.3
info:
  title: Aegis Panel API
  version: 0.2.0
  description: |
    Aegis — self-hosted VPN control panel. Multi-core (sing-box / Xray /
    Hysteria 2), BYO Node, Cascade Topology, MCP-driven, decoy sites,
    port masquerading.

    v0.2.0 surface (this document):
      - /auth/*  (login, refresh, me, change-password)
      - /nodes/*  (CRUD — admin)
      - /nodes/{nodeId}/inbounds/*  (CRUD — admin)
      - /hosts/*  (CRUD — admin)
      - /users/*  (CRUD + rotate-token — admin)
      - /panelcfg/*  (sub_path rotation — admin)
      - /sub/{token}  (public subscription render — anonymous)
      - /audits/*  (audit log read — admin)
      - /health  (liveness — anonymous)
      - /cores  (provider catalog — admin)

    Out of scope for this spec (added in subsequent v0.2.x PRs):
      - /admin/*  (admin principal CRUD — PR-J)
      - /cabinet/*  (end-user cabinet)

  license:
    name: AGPL-3.0-or-later
  contact:
    name: Aegis Panel
    url: https://github.com/QAdversif/AegisPanel

servers:
  - url: https://panel.example.com/api/v1
    description: Production
  - url: http://localhost:8080/api/v1
    description: Local development

security:
  - BearerAuth: []

paths:
  /health:
    get:
      tags: [meta]
      summary: Liveness probe
      description: |
        Returns the panel's health status. Anonymous (no Bearer
        required); used by the load balancer and the CI smoke test.
      security: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'

  /auth/login:
    post:
      tags: [auth]
      summary: Authenticate
      description: |
        Exchange username + password for an access token and a refresh
        token. Wrong credentials always return 401 — the error never
        distinguishes "unknown user" from "wrong password" so
        attackers cannot enumerate.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '400':
          description: Malformed body or missing fields
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Internal error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /auth/refresh:
    post:
      tags: [auth]
      summary: Refresh
      description: |
        Trade a refresh token for a fresh access+refresh pair. The
        presented token is consumed (single-use). Reuse of a
        consumed token is detected and triggers chain revocation:
        every outstanding refresh for the user is invalidated,
        the response is 401, and a `WARN` log line is emitted. This
        is the most likely signal of token theft.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '400':
          description: Malformed body
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: |
            Invalid or already-used refresh token; chain may have
            been revoked.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Internal error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /auth/me:
    get:
      tags: [auth]
      summary: Who am I
      description: |
        Return the identity of the principal behind the bearer
        access token.
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MeResponse'
        '401':
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Internal error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /cores:
    get:
      tags: [meta]
      summary: Core provider catalog
      description: |
        Returns the list of registered sing-box / Xray / Hysteria 2
        provider names plus the in-development (noop) dev provider
        when the panel is in `AEGIS_ENV != production`. The UI uses
        this to render the "core provider" badge on the Nodes page.
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CoreListResponse'
        '401':
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /nodes:
    get:
      tags: [nodes]
      summary: List nodes
      description: |
        Every VPN node registered with the panel. The list is sorted
        by `name` ascending. v0.1.0 does not paginate — the panel
        scale is "tens of nodes" so the full list is fine.
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NodeListResponse'
        '401':
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    post:
      tags: [nodes]
      summary: Register a node
      description: |
        Register a new VPN node with the panel. The agent
        registration handshake is a separate step that lands with
        the BYO Node flow in v0.3 (per the v9 §3.3 roadmap); for now
        the panel stores the node metadata and the operator SSHes
        into the node by hand to install the agent.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NodeCreateRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Node'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '409':
          description: Name or address already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /nodes/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
    get:
      tags: [nodes]
      summary: Get a node
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Node'
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    put:
      tags: [nodes]
      summary: Update a node
      description: |
        Partial update (the same PUT semantics the rest of the
        v0.2.0 CRUD surfaces use). Absent keys mean "leave alone".
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NodeUpdateRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Node'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    delete:
      tags: [nodes]
      summary: Delete a node
      responses:
        '204':
          description: No content
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /nodes/{id}/provision:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
    post:
      tags: [nodes]
      summary: Provision a node (v0.3.0 BYO Node flow)
      description: |
        Runs the bootstrap workflow: SSH probe with
        the supplied key, install the placeholder agent
        systemd unit, and transition the node to either
        `online` (success) or `offline` (failure). Only
        nodes in a provisionable state (`new` or
        `offline`) accept the call; a node already
        `online` returns 409.

        v0.3.0 ships the synchronous `Provision` method.
        v0.5.0 adds a kick-off+poll mode for large
        fleets (returns 202 Accepted with a job id).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NodeProvisionRequest'
      responses:
        '200':
          description: Provision completed (state is now online or offline)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NodeProvisionResponse'
        '400':
          description: Validation error (missing ssh_private_key, unknown tofu_policy, malformed body)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Node not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '409':
          description: Node is not in a provisionable state (e.g. already online)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '502':
          description: Provision failed (SSH unreachable, install error)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /nodes/{nodeId}/inbounds:
    parameters:
      - name: nodeId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    get:
      tags: [inbounds]
      summary: List inbounds for a node
      description: |
        Every inbound registered on the given node. The list is
        sorted by `name` ascending. v0.1.0 does not paginate.
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InboundListResponse'
        '401':
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    post:
      tags: [inbounds]
      summary: Register an inbound
      description: |
        Create a new protocol listener on the given node. The
        `params` field is a free-form JSON blob whose schema is
        owned by the sing-box provider; v0.2.0 surfaces a generic
        JSON editor for it.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InboundCreateRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Inbound'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '409':
          description: Name or port already in use on this node
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /nodes/{nodeId}/inbounds/{id}:
    parameters:
      - name: nodeId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
    get:
      tags: [inbounds]
      summary: Get an inbound
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Inbound'
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    put:
      tags: [inbounds]
      summary: Update an inbound
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InboundUpdateRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Inbound'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    delete:
      tags: [inbounds]
      summary: Delete an inbound
      responses:
        '204':
          description: No content
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /hosts:
    get:
      tags: [hosts]
      summary: List hosts
      description: |
        Every host (bundle of endpoints) registered with the panel.
        v0.1.0 does not paginate.
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HostListResponse'
        '401':
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    post:
      tags: [hosts]
      summary: Create a host
      description: |
        Create a new host. The `endpoints` array is required
        (cross-field validation: 1 endpoint for `type=direct`,
        2+ endpoints plus a balancer strategy for `type=balancer`).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/HostCreateRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Host'
        '400':
          description: Validation error (including cross-field)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /hosts/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
    get:
      tags: [hosts]
      summary: Get a host
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Host'
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    put:
      tags: [hosts]
      summary: Update a host
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/HostUpdateRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Host'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    delete:
      tags: [hosts]
      summary: Delete a host
      responses:
        '204':
          description: No content
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /users:
    get:
      tags: [users]
      summary: List users
      description: |
        Every end-user VPN account registered with the panel.
        v0.1.0 does not paginate.
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserListResponse'
        '401':
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    post:
      tags: [users]
      summary: Create a user
      description: |
        Create a new end-user account. The server generates a
        fresh `sub_token` (32 hex chars) and returns it in the
        response — the operator hands the token to the user out-
        of-band (e.g. via the admin UI's "show once" dialog).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserCreateRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '409':
          description: Username already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /users/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
    get:
      tags: [users]
      summary: Get a user
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    patch:
      tags: [users]
      summary: Update a user
      description: |
        Partial update (the same PATCH semantics the v0.2 CRUD
        surfaces use). Use the `sub_token` PATCH to rotate the
        sub_token; use the `status: deleted` PATCH to soft-delete
        the user. The dedicated `POST /users/{id}/rotate-token`
        endpoint is a convenience for the rotation case.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserUpdateRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /users/{id}/rotate-token:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
    post:
      tags: [users]
      summary: Rotate the user's sub_token
      description: |
        Generate a fresh sub_token. The previous token stops
        working immediately (no grace window) — the operator
        hands the new token to the user out-of-band and the user
        re-imports the URL on every device.
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /panelcfg:
    get:
      tags: [panelcfg]
      summary: Get the active sub_path
      description: |
        Returns the current URL prefix for the subscription
        endpoint. An empty string means the documented
        `/api/v1/sub/{token}` path is in use (the default).
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PanelPathConfig'
        '401':
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /panelcfg/rotate:
    post:
      tags: [panelcfg]
      summary: Rotate to a fresh random sub_path
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PanelPathConfig'
        '401':
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    requestBody:
      required: false
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/PanelPathRotateRequest'

  /panelcfg/rotate-to:
    post:
      tags: [panelcfg]
      summary: Rotate to an explicit sub_path
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PanelPathRotateToRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PanelPathConfig'
        '400':
          description: Invalid path (length or charset)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /panelcfg/reset:
    post:
      tags: [panelcfg]
      summary: Reset to the default empty sub_path
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PanelPathConfig'
        '401':
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /sub/{token}:
    parameters:
      - name: token
        in: path
        required: true
        schema:
          type: string
    get:
      tags: [subscription]
      summary: Render a subscription
      description: |
        The public subscription render endpoint. The
        `{token}` is the user's `sub_token` (the credential).
        The `?target=` query parameter selects the wire
        format (`base64` default, `singbox`, `clash`, `html`).
        The endpoint is rate-limited per sub_token (1 rps
        sustained, 5 burst by default); an over-budget
        request returns 429 with a `Retry-After` header.
      security: []
      parameters:
        - name: target
          in: query
          required: false
          schema:
            type: string
            enum: [base64, singbox, clash, html]
      responses:
        '200':
          description: OK
          content:
            text/plain:
              schema:
                type: string
              example: 'vless://uuid@node1.example.com:443?type=tcp&security=none#node1'
            application/json:
              schema:
                type: object
                additionalProperties: true
              example:
                outbounds:
                  - type: vless
                    server: node1.example.com
                    port: 443
            text/yaml:
              schema:
                type: string
              example: |
                proxies:
                  - name: "node1"
                    type: vless
                    server: node1.example.com
                    port: 443
            text/html:
              schema:
                type: string
              example: |
                <!doctype html>
                <html><body><h1>AegisPanel subscription</h1></body></html>
        '400':
          description: Missing sub_token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: User is not in a live state (disabled / expired / deleted)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Unknown sub_token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '415':
          description: Unsupported ?target= value
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '429':
          description: |
            Rate limit exceeded. The `Retry-After` header
            contains the wall-clock seconds to wait before
            retrying.
          headers:
            Retry-After:
              schema:
                type: integer
                description: Seconds to wait before retrying.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /auth/me/password:
    post:
      tags: [auth]
      summary: Change my password
      description: |
        Rotate the calling operator's argon2id password. The current
        password is verified to defend against a stolen bearer token
        being used to lock the operator out of their own account —
        the security model is "an attacker with a stolen token must
        also know the password before they can change it".

        On success, the existing refresh tokens are KEPT (the user
        is not logged out); the operator's other browsers and
        devices stay authenticated. A future PR adds an
        "invalidate all sessions" toggle for the
        "I think I lost my laptop" path.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChangePasswordRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MeResponse'
        '400':
          description: |
            Malformed body, missing fields, or new password too
            short (< 8 chars) or unchanged from the current one.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: |
            Missing/invalid bearer token, or the current password
            is wrong (collapsed to the same code as the
            "no such user" 401 to avoid leaking which is which).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Internal error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /audits:
    get:
      tags: [audits]
      summary: List audit log entries
      description: |
        Returns the most recent audit entries, ordered by
        `createdAt` DESC. The default cap is 100; the maximum
        is 1000 (the server clamps above that). The list path
        elides the `before` / `after` JSONB blobs to keep the
        response compact; the `/{id}` path returns them in full.

        Every entry is the v0.2.0 wire shape: `actorId`,
        `actorUsername`, `action`, `resourceType`,
        `resourceId`, `ip`, `userAgent`, `createdAt`. The
        `actorUsername` is denormalised from `admins.username`
        at write time so the read path does not need to join.

        The v0.2.0 read API is the entire surface — the write
        path (the in-handler `audits.Record(...)` call) is
        internal. v0.3+ adds the mutating-handler call-sites
        for the nodes / hosts / inbounds / users / panelcfg
        endpoints; this PR ships the read surface + the
        change-password trigger.
      parameters:
        - name: actor_id
          in: query
          required: false
          schema:
            type: string
            format: uuid
          description: Filter by `actorId` (exact match).
        - name: action
          in: query
          required: false
          schema:
            type: string
          description: |
            Filter by `action` (exact match, e.g.
            `user.create`, `host.update`).
        - name: resource_type
          in: query
          required: false
          schema:
            type: string
          description: |
            Filter by `resourceType` (exact match, e.g.
            `user`, `host`, `inbound`).
        - name: resource_id
          in: query
          required: false
          schema:
            type: string
          description: Filter by `resourceId` (exact match).
        - name: since
          in: query
          required: false
          schema:
            type: string
            format: date-time
          description: |
            RFC3339 timestamp. Entries with
            `createdAt < since` are excluded.
        - name: until
          in: query
          required: false
          schema:
            type: string
            format: date-time
          description: |
            RFC3339 timestamp. Entries with
            `createdAt > until` are excluded.
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 1000
            default: 100
          description: |
            Maximum entries to return. The server clamps
            values above 1000 down to 1000. A value below
            1 is treated as 0 and the default cap is used.
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuditListResponse'
        '400':
          description: |
            Bad query parameter (e.g. malformed `since` /
            `until`, or `until < since`).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Missing `audits` scope
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Internal error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /audits/{id}:
    get:
      tags: [audits]
      summary: Get a single audit entry
      description: |
        Returns a single entry by id, with the `before` /
        `after` JSONB blobs in full. The `id` is the
        bigserial from the `audit_log` table rendered
        as a string for stable cross-language parsing.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: The audit entry id.
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuditEntry'
        '401':
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Missing `audits` scope
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: No such audit entry
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Internal error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        `Authorization: Bearer <jwt-access-token>`. Tokens are
        HS256-signed by Aegis (`iss=aegis-panel`,
        `aud=aegis-panel/v1`).

  schemas:
    Error:
      type: object
      required: [error]
      properties:
        error:
          type: string
          description: |
            Human-readable error message. For security reasons
            the auth endpoints collapse several failure modes
            into a single generic message; do not branch on
            the message text.

    HealthResponse:
      type: object
      required: [status, version]
      properties:
        status:
          type: string
          enum: [ok]
        version:
          type: string
          example: 0.0.0-dev
        commit:
          type: string
          example: deadbeef

    CoreListResponse:
      type: object
      required: [providers]
      properties:
        providers:
          type: array
          items:
            $ref: '#/components/schemas/CoreProvider'

    CoreProvider:
      type: object
      required: [name, version]
      properties:
        name:
          type: string
          example: singbox
        version:
          type: string
          example: 1.8.0
        dev:
          type: boolean
          description: True when this is a development-only provider (e.g. noop).

    LoginRequest:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
          example: admin
        password:
          type: string
          format: password
          example: aegis-dev-password

    RefreshRequest:
      type: object
      required: [refresh_token]
      properties:
        refresh_token:
          type: string
          pattern: '^[0-9a-f]{64}$'
          example: 4f2a8b...64hex
          description: |
            Opaque 32-byte hex token (64 chars lowercase). Only the
            SHA-256 hash is stored server-side.

    LoginResponse:
      type: object
      required: [access_token, refresh_token, token_type, expires_at, scopes]
      properties:
        access_token:
          type: string
          description: HS256 JWT access token. 15-min TTL.
        refresh_token:
          type: string
          pattern: '^[0-9a-f]{64}$'
          description: |
            Opaque refresh token. 30-day TTL. Single-use; rotation
            on every refresh.
        token_type:
          type: string
          enum: [Bearer]
        expires_at:
          type: string
          format: date-time
        scopes:
          type: array
          items:
            type: string
            enum: [admin, read, write, nodes, users, subscriptions, hosts, audits]

    MeResponse:
      type: object
      required: [user_id, username, scopes]
      properties:
        user_id:
          type: string
          example: u-bootstrap
        username:
          type: string
          example: admin
        scopes:
          type: array
          items:
            type: string
            enum: [admin, read, write, nodes, users, subscriptions, hosts, audits]

    NodeState:
      type: string
      enum: [new, online, draining, offline, disabled]

    TofuPolicy:
      type: string
      enum: [reject, accept-and-append]
      description: |
        Trust-on-first-use policy for the SSH host key.

        - `reject` (default): the operator must paste the
          expected SHA256 fingerprint in `expected_fingerprint`
          before the panel will connect. Safe mode.
        - `accept-and-append`: on first contact, accept the
          server's key, append it to the panel's known_hosts,
          and continue. The fingerprint is returned in
          the response so the operator can verify it after.

    Node:
      type: object
      required: [id, name, region, state, address, createdAt, updatedAt]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
          maxLength: 64
        region:
          type: string
          maxLength: 64
        state:
          $ref: '#/components/schemas/NodeState'
        address:
          type: string
          description: 'SSH endpoint (host:port) the panel uses to reach the node.'
        capacityHint:
          type: string
          maxLength: 64
        tags:
          type: array
          items:
            type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    NodeCreateRequest:
      type: object
      required: [name, region, address]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 64
        region:
          type: string
          minLength: 1
          maxLength: 64
        address:
          type: string
          minLength: 1
        capacityHint:
          type: string
          maxLength: 64

    NodeUpdateRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 64
        region:
          type: string
          minLength: 1
          maxLength: 64
        address:
          type: string
        state:
          $ref: '#/components/schemas/NodeState'
        capacityHint:
          type: string
          maxLength: 64
        tags:
          type: array
          items:
            type: string

    NodeProvisionRequest:
      type: object
      required: [ssh_private_key]
      properties:
        ssh_port:
          type: integer
          minimum: 1
          maximum: 65535
          description: Per-call override. Zero/omitted means "use the service-wide default (22)".
        ssh_user:
          type: string
          description: Per-call override. Empty/omitted means "use the service-wide default (root)".
        ssh_private_key:
          type: string
          format: password
          description: |
            Operator-pasted private key (PEM, no passphrase).
            The panel does NOT store this; the install is
            the only consumer.
        tofu_policy:
          $ref: '#/components/schemas/TofuPolicy'
        expected_fingerprint:
          type: string
          description: |
            Operator-confirmed SHA256 fingerprint. Required
            when `tofu_policy` is `reject`; ignored when
            `accept-and-append`. Format: `SHA256:base64`.

    NodeProvisionResponse:
      type: object
      required: [node_id, new_state]
      properties:
        node_id:
          type: string
          format: uuid
        new_state:
          $ref: '#/components/schemas/NodeState'
        install_stage:
          type: string
          description: |
            Best-effort stage tag from the provisioner
            (`connect` / `upload` / `env` / `unit` /
            `verify`). Surface in the UI tooltip for the
            "retry" button.
        install_error:
          type: string
          description: Set when `new_state` is `offline`. Empty string on success.
        verify_latency:
          type: string
          description: ISO-8601 duration string (e.g. `PT2.5S`) for the systemd is-active poll.

    NodeListResponse:
      type: object
      required: [nodes]
      properties:
        nodes:
          type: array
          items:
            $ref: '#/components/schemas/Node'

    Protocol:
      type: string
      enum: [vless, hysteria2, shadowsocks, trojan]

    Inbound:
      type: object
      required: [id, nodeId, name, protocol, listen, listenPort, enabled, createdAt, updatedAt]
      properties:
        id:
          type: string
          format: uuid
        nodeId:
          type: string
          format: uuid
        name:
          type: string
          maxLength: 64
        protocol:
          $ref: '#/components/schemas/Protocol'
        listen:
          type: string
          example: '::'
        listenPort:
          type: integer
          minimum: 1
          maximum: 65535
        listenPorts:
          type: array
          items:
            type: integer
            minimum: 1
            maximum: 65535
        enabled:
          type: boolean
        tags:
          type: array
          items:
            type: string
        params:
          type: object
          additionalProperties: true
          description: |
            Protocol-specific configuration. The shape is owned
            by the sing-box provider; v0.2.0 surfaces a generic
            JSON editor for it.
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    InboundCreateRequest:
      type: object
      required: [name, protocol, listenPort]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 64
        protocol:
          $ref: '#/components/schemas/Protocol'
        listen:
          type: string
        listenPort:
          type: integer
          minimum: 1
          maximum: 65535
        listenPorts:
          type: array
          items:
            type: integer
            minimum: 1
            maximum: 65535
        enabled:
          type: boolean
        tags:
          type: array
          items:
            type: string
        params:
          type: object
          additionalProperties: true

    InboundUpdateRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 64
        protocol:
          $ref: '#/components/schemas/Protocol'
        listen:
          type: string
        listenPort:
          type: integer
          minimum: 1
          maximum: 65535
        listenPorts:
          type: array
          items:
            type: integer
            minimum: 1
            maximum: 65535
        enabled:
          type: boolean
        tags:
          type: array
          items:
            type: string
        params:
          type: object
          additionalProperties: true

    InboundListResponse:
      type: object
      required: [inbounds]
      properties:
        inbounds:
          type: array
          items:
            $ref: '#/components/schemas/Inbound'

    HostType:
      type: string
      enum: [direct, balancer]

    BalancerStrategy:
      type: string
      enum: [round_robin, least_loaded, random, least_ping, urltest]

    Balancer:
      type: object
      required: [strategy]
      properties:
        strategy:
          $ref: '#/components/schemas/BalancerStrategy'
        healthcheckUrl:
          type: string
          format: uri
        healthcheckIntervalSec:
          type: integer
          minimum: 1
          maximum: 3600
        failoverEndpointIds:
          type: array
          items:
            type: string
            format: uuid

    Endpoint:
      type: object
      required: [nodeId, inboundId, weight]
      properties:
        id:
          type: string
          format: uuid
        nodeId:
          type: string
          format: uuid
        inboundId:
          type: string
          format: uuid
        weight:
          type: integer
          minimum: 1
          maximum: 1000
          default: 1
        address:
          type: array
          items:
            type: string
          maxItems: 8
        port:
          type: integer
          minimum: 1
          maximum: 65535
        sni:
          type: array
          items:
            type: string
          maxItems: 8
        host:
          type: array
          items:
            type: string
          maxItems: 8
        path:
          type: string
          maxLength: 256
        downloadHostId:
          type: string
          format: uuid

    Host:
      type: object
      required: [id, remark, type, enabled, priority, endpoints, createdAt, updatedAt]
      properties:
        id:
          type: string
          format: uuid
        remark:
          type: string
          maxLength: 64
        displayName:
          type: string
          maxLength: 128
        type:
          $ref: '#/components/schemas/HostType'
        enabled:
          type: boolean
        priority:
          type: integer
          minimum: 0
          maximum: 1000
        statusFilter:
          type: array
          items:
            type: string
            enum: [active, on_hold, expired, limited, disabled]
        country:
          type: string
          maxLength: 2
          description: ISO 3166-1 alpha-2 country code.
        city:
          type: string
          maxLength: 64
        tags:
          type: array
          items:
            type: string
        endpoints:
          type: array
          minItems: 1
          maxItems: 32
          items:
            $ref: '#/components/schemas/Endpoint'
        balancer:
          $ref: '#/components/schemas/Balancer'
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    HostCreateRequest:
      type: object
      required: [remark, type, endpoints]
      properties:
        remark:
          type: string
          minLength: 1
          maxLength: 64
        displayName:
          type: string
          maxLength: 128
        type:
          $ref: '#/components/schemas/HostType'
        enabled:
          type: boolean
        priority:
          type: integer
          minimum: 0
          maximum: 1000
        statusFilter:
          type: array
          items:
            type: string
            enum: [active, on_hold, expired, limited, disabled]
        country:
          type: string
          maxLength: 2
        city:
          type: string
          maxLength: 64
        tags:
          type: array
          items:
            type: string
        endpoints:
          type: array
          minItems: 1
          maxItems: 32
          items:
            $ref: '#/components/schemas/Endpoint'
        balancer:
          $ref: '#/components/schemas/Balancer'

    HostUpdateRequest:
      type: object
      properties:
        remark:
          type: string
          minLength: 1
          maxLength: 64
        displayName:
          type: string
          maxLength: 128
        type:
          $ref: '#/components/schemas/HostType'
        enabled:
          type: boolean
        priority:
          type: integer
          minimum: 0
          maximum: 1000
        statusFilter:
          type: array
          items:
            type: string
            enum: [active, on_hold, expired, limited, disabled]
        country:
          type: string
          maxLength: 2
        city:
          type: string
          maxLength: 64
        tags:
          type: array
          items:
            type: string
        endpoints:
          type: array
          minItems: 1
          maxItems: 32
          items:
            $ref: '#/components/schemas/Endpoint'
        balancer:
          $ref: '#/components/schemas/Balancer'

    HostListResponse:
      type: object
      required: [hosts]
      properties:
        hosts:
          type: array
          items:
            $ref: '#/components/schemas/Host'

    UserLifecycleStatus:
      type: string
      enum: [active, grace, disabled, expired, deleted]

    User:
      type: object
      required: [id, username, status, trafficLimitBytes, trafficUsedBytes, deviceLimit, subToken, createdAt, updatedAt]
      properties:
        id:
          type: string
          format: uuid
        username:
          type: string
        status:
          $ref: '#/components/schemas/UserLifecycleStatus'
        planId:
          type: string
          format: uuid
        expireAt:
          type: string
          format: date-time
        trafficLimitBytes:
          type: integer
          format: int64
        trafficUsedBytes:
          type: integer
          format: int64
        deviceLimit:
          type: integer
          minimum: 0
          maximum: 64
        hostsAllowlist:
          type: array
          items:
            type: string
            format: uuid
        hostsBlocklist:
          type: array
          items:
            type: string
            format: uuid
        subToken:
          type: string
          pattern: '^[0-9a-f]{64}$'
        subTokenRotatedAt:
          type: string
          format: date-time
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    UserCreateRequest:
      type: object
      required: [username]
      properties:
        username:
          type: string
          minLength: 3
          maxLength: 32
        status:
          $ref: '#/components/schemas/UserLifecycleStatus'
        planId:
          type: string
          format: uuid
        expireAt:
          type: string
          format: date-time
        trafficLimitBytes:
          type: integer
          format: int64
          minimum: 0
        deviceLimit:
          type: integer
          minimum: 0
          maximum: 64

    UserUpdateRequest:
      type: object
      properties:
        username:
          type: string
          minLength: 3
          maxLength: 32
        status:
          $ref: '#/components/schemas/UserLifecycleStatus'
        planId:
          type: string
          format: uuid
        clearPlanId:
          type: boolean
        expireAt:
          type: string
          format: date-time
        clearExpireAt:
          type: boolean
        trafficLimitBytes:
          type: integer
          format: int64
          minimum: 0
        deviceLimit:
          type: integer
          minimum: 0
          maximum: 64

    UserListResponse:
      type: object
      required: [users]
      properties:
        users:
          type: array
          items:
            $ref: '#/components/schemas/User'

    PanelPathConfig:
      type: object
      required: [id, subPath, rotatedAt, createdAt]
      properties:
        id:
          type: string
          format: uuid
        subPath:
          type: string
          description: |
            The current URL prefix. Empty = the default
            `/api/v1/sub/{token}` path. Non-empty = a rotated
            secret prefix.
        rotatedAt:
          type: string
          format: date-time
        createdAt:
          type: string
          format: date-time

    PanelPathRotateRequest:
      type: object
      properties:
        graceWindowSeconds:
          type: integer
          minimum: 0
          maximum: 3600
          description: |
            Grace window during which the OLD sub_path is
            still served. 0 = no grace. The server caps at
            1 hour.

    PanelPathRotateToRequest:
      type: object
      required: [subPath]
      properties:
        subPath:
          type: string
          minLength: 4
          maxLength: 64
          pattern: '^[a-z0-9-]+$'
          description: |
            The new sub_path. Must match [a-z0-9-]{4,64}.
        graceWindowSeconds:
          type: integer
          minimum: 0
          maximum: 3600

    ChangePasswordRequest:
      type: object
      required: [current_password, new_password]
      properties:
        current_password:
          type: string
          description: The operator's CURRENT password. Verified to defend against a stolen access token.
        new_password:
          type: string
          minLength: 8
          description: The NEW password. Must differ from the current one and be at least 8 chars.

    AuditEntry:
      type: object
      required: [id, action, resourceType, createdAt]
      properties:
        id:
          type: string
          description: |
            The bigserial id rendered as a string for stable
            cross-language parsing.
        actorId:
          type: string
          format: uuid
          description: The admin UUID that triggered the action. Empty for system-driven entries.
        actorUsername:
          type: string
          description: |
            Denormalised from `admins.username` at write time
            so the read path does not need to join.
        action:
          type: string
          description: |
            The action verb (e.g. `user.create`,
            `user.update`, `host.rotate_token`). Closed set
            in v0.3; free-form in v0.2.
        resourceType:
          type: string
          description: |
            The noun side of the action (`user`, `host`,
            `inbound`, `node`, `panelcfg`).
        resourceId:
          type: string
          description: The target's primary key. Empty for collection-level actions.
        before:
          description: |
            The pre-mutation state as a JSONB blob. Returned
            in full only on the `/{id}` path; the list path
            elides it (`null` on the wire).
        after:
          description: |
            The post-mutation state. Same caveats as
            `before`.
        ip:
          type: string
          description: The client IP, copied from `r.RemoteAddr` (after RealIP middleware).
        userAgent:
          type: string
          description: The raw User-Agent header. Capped at 512 chars on the pgx-INSERT path.
        createdAt:
          type: string
          format: date-time
          description: Wall-clock time the entry was minted (UTC).

    AuditListResponse:
      type: object
      required: [audits]
      properties:
        audits:
          type: array
          items:
            $ref: '#/components/schemas/AuditEntry'
          description: |
            The list of entries matching the filter. The
            list path elides `before` / `after`; the
            `/{id}` path returns them in full.
